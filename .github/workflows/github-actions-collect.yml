name: Collect and update AI API sites

on:
  workflow_dispatch:
  schedule:
    # 每天中午12点运行一次采集脚本（UTC 时间 04:00 = 北京时间 12:00）
    - cron: '0 4 * * *'

permissions:
  contents: write

jobs:
  collect-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci

      - name: Run collector script
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          npm run collect

      - name: Commit and push updated sites.json (if changed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ -z "$(git status --porcelain public/data/sites.json)" ]]; then
            echo "sites.json 无变化，跳过提交。"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/data/sites.json
          git commit -m "chore: update sites data (auto)"
          git pull --rebase origin main
          git push origin HEAD:main
